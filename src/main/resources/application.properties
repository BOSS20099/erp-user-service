spring.application.name=erp-user-service
spring.datasource.url=jdbc:mysql://localhost:3306/erp_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Casablanca

# Jackson configuration for JSON serialization
spring.jackson.time-zone=Africa/Casablanca
spring.jackson.default-property-inclusion=non_null

server.port=8080
