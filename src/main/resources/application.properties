spring.application.name=erp-user-service
spring.datasource.url=jdbc:mysql://localhost:3306/erp_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JDBC Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Jackson configuration for JSON serialization
spring.jackson.time-zone=Africa/Casablanca
spring.jackson.default-property-inclusion=non_null

server.port=8080

# Enable SQL logging for debugging
logging.level.org.springframework.jdbc=DEBUG
